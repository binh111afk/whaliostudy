<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang chuyển hướng... | Whalio Study</title>
  <script>
    // Lưu lại path hiện tại để React Router xử lý sau
    const path = window.location.pathname + window.location.search + window.location.hash;
    
    // Nếu không phải trang chủ, redirect về trang chủ với path gốc
    if (path && path !== '/') {
      // Sử dụng sessionStorage để lưu redirect path
      sessionStorage.setItem('redirectPath', path);
    }
    
    // Redirect về trang chủ
    window.location.replace('/');
  </script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Đang chuyển hướng về trang chủ...</p>
  </div>
</body>
</html>
